name: rest_flow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0' # تم تعديل البيئة لتقبل إصدار جهازك والإصدارات القريبة منه

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: any
  equatable: any
  get_it: any
  flutter_secure_storage: any
  dio: any
  retrofit: any
  json_annotation: any
  dartz: any
  badges: any
  firebase_core: any
  firebase_messaging: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: any
  json_serializable: any
  retrofit_generator: any

flutter:
  uses-material-design: true

  fonts:
