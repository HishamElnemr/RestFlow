name: rest_flow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0' # تم تعديل البيئة لتقبل إصدار جهازك والإصدارات القريبة منه

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  flutter_secure_storage: ^10.3.1
  dio: ^5.9.2
  retrofit: ^4.9.2
  json_annotation: ^4.12.0
  dartz: ^0.10.1
  badges: ^3.1.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.4.1
  flutter_svg: ^2.3.0
  pinput: ^5.0.0
  flutter_local_notifications: ^17.2.1
  skeletonizer: ^2.1.3
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: any
  json_serializable: any
  retrofit_generator: any

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_18pt-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter/static/Inter_18pt-ThinItalic.ttf
          weight: 100
          style: italic
